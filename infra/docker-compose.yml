# Image-search infra stack: Qdrant + ml-service (GPU).
#
# Secrets are referenced by NAME ONLY via env_file / ${VAR} interpolation —
# never put literal secret values in this file. Copy .env.example to .env at the
# repo root and fill real values there (git-ignored).
#
# GPU verification (run after `docker compose up`):
#   docker compose -f infra/docker-compose.yml run --rm ml-service \
#       python -c "import torch; assert torch.cuda.is_available()"

services:
  qdrant:
    image: qdrant/qdrant:v1.12.1
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST/HTTP
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
      - ./qdrant-config.yaml:/qdrant/config/production.yaml:ro
    healthcheck:
      # Qdrant image ships without curl/wget; use the bundled healthcheck via
      # the TCP readiness endpoint. `/readyz` returns 200 when serving.
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  ml-service:
    build:
      context: ../ml-service
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    # --- GPU access (Compose >= v2.30 / Docker >= 25 with NVIDIA runtime) ---
    gpus: all
    # --- Swarm equivalent (use INSTEAD of `gpus: all` under `docker stack`) ---
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    env_file:
      - path: ../.env
        required: false
    environment:
      # Names only — values come from ../.env (git-ignored). Qdrant reachable by
      # service name on the compose network.
      - QDRANT_URL=http://qdrant:6333
      - ENCODER=${ENCODER:-siglip2}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-}
      - ACTIVE_COLLECTION=${ACTIVE_COLLECTION:-}
      - DEVICE=${DEVICE:-cuda}
      - BATCH_SIZE=${BATCH_SIZE:-32}
      # ML_SERVICE_SHARED_SECRET, QDRANT_API_KEY, D1_* provided via env_file.
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_storage:
    driver: local
